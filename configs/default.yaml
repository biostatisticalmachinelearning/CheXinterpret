seed: 13

paths:
  image_root: "/path/to/chexpert_plus"
  metadata_csv: "/path/to/chexpert_plus/df_chexpert_plus_240401.csv"
  chexbert_labels_json: "/path/to/chexpert_plus/chexbert_labels.zip"
  output_root: "outputs/default"

schema:
  image_path_col: "path_to_image"
  split_col: "split"
  patient_id_col: "patient_id"
  age_col: "patient_age"
  sex_col: "patient_sex"
  race_col: "patient_race"
  pathology_cols:
    - "No Finding"
    - "Enlarged Cardiomediastinum"
    - "Cardiomegaly"
    - "Lung Opacity"
    - "Lung Lesion"
    - "Edema"
    - "Consolidation"
    - "Pneumonia"
    - "Atelectasis"
    - "Pneumothorax"
    - "Pleural Effusion"
    - "Pleural Other"
    - "Fracture"
    - "Support Devices"
  metadata_cols:
    - "patient_age"
    - "patient_sex"
    - "patient_race"
    - "patient_ethnicity"
    - "patient_insurance_type"
    - "patient_primary_language"
    - "split"
    - "patient_id"

data:
  allowed_splits: ["train", "valid", "test"]
  validation_split_name: "valid"
  test_split_name: "test"
  uncertain_label_policy: "zero"
  min_age: 18
  max_age: 110
  age_bins: [18, 35, 50, 65, 80, 120]

features:
  model_name: "StanfordAIMI/CheXagent-8b"
  device: "cuda"
  batch_size: 8
  num_workers: 4
  precision: "fp16"
  pooling: "mean"
  force_recompute: false

sae:
  latent_dim: 2048
  variant: "l1"
  topk_k: 64
  l1_lambda: 1.0e-4
  learning_rate: 1.0e-3
  weight_decay: 1.0e-6
  batch_size: 512
  epochs: 40
  eval_every_epochs: 5

probes:
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  batch_size: 1024
  epochs: 30

fairness:
  target_metric: "macro_auroc"
  bootstrap_samples: 200
  debias_strength: 1.0
  threshold: 0.5
