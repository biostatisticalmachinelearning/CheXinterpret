seed: 13

paths:
  image_root: "/path/to/chexpert_plus"
  metadata_csv: "/path/to/chexpert_plus/df_chexpert_plus_240401.csv"
  chexbert_labels_json: "/path/to/chexpert_plus/chexbert_labels.zip"
  output_root: "outputs/quickstart"

schema:
  image_path_col: "path_to_image"
  split_col: "split"
  patient_id_col: "patient_id"
  age_col: "age"
  sex_col: "sex"
  race_col: "race"
  pathology_cols:
    - "No Finding"
    - "Cardiomegaly"
    - "Edema"
    - "Consolidation"
    - "Atelectasis"
    - "Pleural Effusion"
  metadata_cols:
    - "age"
    - "sex"
    - "race"
    - "ethnicity"
    - "interpreter_needed"
    - "insurance_type"
    - "recent_bmi"
    - "deceased"

data:
  allowed_splits: ["train", "valid", "test"]
  validation_split_name: "valid"
  test_split_name: "test"
  uncertain_label_policy: "zero"
  min_age: 18
  max_age: 110
  age_bins: [18, 40, 60, 120]

features:
  model_name: "StanfordAIMI/CheXagent-8b"
  cache_dir: ".cache/huggingface"
  device: "cuda"
  batch_size: 2
  num_workers: 0
  precision: "fp16"
  pooling: "mean"
  force_recompute: false

sae:
  latent_dim: 256
  variant: "l1"
  topk_k: 32
  l1_lambda: 5.0e-4
  learning_rate: 1.0e-3
  weight_decay: 1.0e-6
  batch_size: 64
  epochs: 3
  eval_every_epochs: 1

probes:
  c_value: 1.0
  max_iter: 2000

fairness:
  target_metric: "macro_auroc"
  bootstrap_samples: 20
  debias_strength: 1.0
  debias_mode: "train_and_test"
  threshold: 0.5
